name = "git-diff"
version = "1.1.0"
description = "Show git diff in a split view with revert capability"

[permissions]
execute = ["git"]

[[config]]
key = "display_mode"
label = "Display Mode"
type = "choice"
choices = ["panel", "tab"]
default = "panel"

[[menu_items]]
label = "Show Git Diff"
action = "show_diff"
shortcut = "Ctrl+Shift+D"
